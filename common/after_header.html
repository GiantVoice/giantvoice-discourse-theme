{{#if themeSettings.show_giantvoice_bar}}
  <div class="gv-community-strip">
    <a class="gv-community-brand" href="{{themeSettings.home_url}}">
      <span class="gv-community-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" role="img" focusable="false" aria-label="GiantVoice">
          <path fill="currentColor" d="M9 23h5l9 7V10l-9 7H9z" />
          <path fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" d="M27 16.5c1.5 1.7 1.5 5.3 0 7" />
          <path fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" d="M31 12.5c3.4 4.2 3.4 10.8 0 15" />
        </svg>
      </span>
      <span class="gv-community-copy">
        <strong>GiantVoice</strong>
        <span>DAF community and field-built resources</span>
      </span>
    </a>
    <nav class="gv-community-links" aria-label="GiantVoice links">
      <a href="{{themeSettings.home_url}}">Home</a>
      <a href="{{themeSettings.statements_url}}">Statements</a>
      <a href="{{themeSettings.resources_url}}">Resources</a>
    </nav>
  </div>
{{/if}}
